{% load i18n %}

{% if not theme %}
    <div class="@container border-b border-base-200 flex flex-row gap-1 mb-1 pb-1 px-2 dark:border-base-700">
        <a class="cursor-pointer flex flex-row gap-2 grow px-2 py-1.5 rounded-default hover:bg-base-100 hover:text-base-700 dark:hover:bg-base-700 dark:hover:text-base-200 @max-[240px]:justify-center"
           x-on:click="switchTheme('light')"
           x-bind:class="adminTheme == 'light'  && 'text-primary-600 dark:text-primary-500 dark:hover:text-primary-500! hover:text-primary-600!'">
            <span class="material-symbols-outlined">light_mode</span>
            <span class="leading-none self-center @max-[240px]:hidden">{% trans "Light" %}</span>
        </a>

        <a class="cursor-pointer flex flex-row gap-2  grow leading-none -ml-1 px-2 py-1.5 rounded-default hover:bg-base-100 hover:text-base-700 dark:hover:bg-base-700 dark:hover:text-base-200 @max-[240px]:justify-center"
           x-on:click="switchTheme('dark')"
           x-bind:class="adminTheme == 'dark' && 'text-primary-600 dark:text-primary-500 dark:hover:text-primary-500! hover:text-primary-600!'">
            <span class="material-symbols-outlined">dark_mode</span>
            <span class="leading-none self-center @max-[240px]:hidden">{% trans "Dark" %}</span>
        </a>

        <a class="cursor-pointer flex flex-row gap-2 grow -mr-1 px-2 py-1.5 rounded-default hover:bg-base-100 hover:text-base-700 dark:hover:bg-base-700 dark:hover:text-base-200 @max-[240px]:justify-center"
           x-on:click="switchTheme('auto')"
           x-bind:class="adminTheme == 'auto' && 'text-primary-600 dark:text-primary-500 dark:hover:text-primary-500! hover:text-primary-600!'">
            <span class="material-symbols-outlined">computer</span>
            <span class="leading-none self-center @max-[240px]:hidden">{% trans "System" %}</span>
        </a>
    </div>
{% endif %}
